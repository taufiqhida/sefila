<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Login API - SEFILA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .api-url {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 30px;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .result pre {
            margin-top: 10px;
            background: rgba(0,0,0,0.05);
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
        }
        .hint {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Test Login API</h1>
        <div class="api-url">POST http://103.172.204.30/api/auth/login</div>
        
        <div class="hint">
            <strong>💡 Info:</strong> Password default adalah tanggal lahir dengan format <code>DDMMYYYY</code>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="nik">NIK (16 digit)</label>
                <input type="text" id="nik" name="nik" placeholder="1234567890123456" maxlength="16" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password (DDMMYYYY)</label>
                <input type="text" id="password" name="password" placeholder="01011990" required>
            </div>
            
            <button type="submit">Login</button>
        </form>

        <div id="result" class="result"></div>
    </div>

    <script>
        const API_URL = 'http://103.172.204.30/api/auth/login';
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nik = document.getElementById('nik').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            
            // Validasi NIK
            if (!/^\d{16}$/.test(nik)) {
                showResult('error', 'NIK harus 16 digit angka!');
                return;
            }
            
            try {
                resultDiv.style.display = 'none';
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ nik, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    showResult('success', '✅ Login Berhasil!', data);
                    
                    // Simpan token ke localStorage
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                } else {
                    showResult('error', '❌ Login Gagal: ' + data.message, data);
                }
            } catch (error) {
                showResult('error', '❌ Error: ' + error.message, { error: error.toString() });
            }
        });
        
        function showResult(type, message, data = null) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = `result ${type}`;
            
            let html = `<strong>${message}</strong>`;
            
            if (data) {
                html += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            }
            
            resultDiv.innerHTML = html;
            resultDiv.style.display = 'block';
        }
    </script>
</body>
</html>
